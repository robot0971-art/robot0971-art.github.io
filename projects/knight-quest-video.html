<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knight Quest Video - Portfolio</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #f6d365 0%, #fda085 45%, #9face6 100%);
        }

        .video-page {
            min-height: 100vh;
            padding: 100px 20px 48px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .video-shell {
            width: min(100%, 520px);
        }

        .video-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 1.5rem;
            color: var(--white);
        }

        .video-top h1 {
            font-size: 2.4rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.18);
        }

        .video-frame {
            width: fit-content;
            max-width: 100%;
            margin: 0 auto;
            padding: 18px;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.55);
            box-shadow: var(--shadow-hover);
        }

        .feature-video {
            width: auto;
            max-width: 100%;
            max-height: 78vh;
            display: block;
            margin: 0 auto;
            border-radius: 10px;
            background: #111;
            box-shadow: var(--shadow);
        }

        .back-btn {
            color: var(--white);
            text-decoration: none;
            font-weight: 500;
            transition: transform 0.3s;
            white-space: nowrap;
        }

        .back-btn:hover {
            transform: translateX(-5px);
        }

        .back-btn i {
            margin-right: 0.5rem;
        }

        @media (max-width: 768px) {
            .video-page {
                align-items: flex-start;
                padding-top: 92px;
            }

            .video-top {
                align-items: flex-start;
                flex-direction: column;
            }

            .video-top h1 {
                font-size: 2rem;
            }

            .video-frame {
                padding: 10px;
            }
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="../index.html" class="nav-logo">Portfolio</a>
            <ul class="nav-menu">
                <li><a href="../index.html#home" class="nav-link">Home</a></li>
                <li><a href="../index.html#about" class="nav-link">About</a></li>
                <li><a href="../index.html#skills" class="nav-link">Skills</a></li>
                <li><a href="../index.html#projects" class="nav-link">Projects</a></li>
                <li><a href="../index.html#contact" class="nav-link">Contact</a></li>
            </ul>
            <div class="hamburger">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
        </div>
    </nav>

    <main class="video-page">
        <div class="video-shell">
            <div class="video-top">
                <a href="knight-quest.html" class="back-btn">
                    <i class="fas fa-arrow-left"></i> Knight Quest로 돌아가기
                </a>
                <h1>Knight Quest</h1>
            </div>
            <div class="video-frame">
                <video controls autoplay muted playsinline preload="auto" class="feature-video"
                    poster="../images/projects/knight-quest-title.png">
                    <source src="../videos/knight-quest-full.mp4" type="video/mp4">
                    브라우저가 동영상 재생을 지원하지 않습니다.
                </video>
            </div>
        </div>
    </main>

    <script src="../js/main.js"></script>
</body>

</html>
